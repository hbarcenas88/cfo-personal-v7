<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f7fb">
  <meta name="description" content="CFO Personal, app mobile-first de finanzas personales.">
  <title>CFO Personal V7</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles/base.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/screens.css">
</head>
<body>
  <div id="app" class="app-shell">
    <div class="boot-screen">
      <div class="boot-logo">CFO <span>Personal</span></div>
      <p>Preparando tu app financiera...</p>
    </div>
  </div>
  <div id="toast-root" aria-live="polite"></div>
  <script>
    window.CFO_BOOT_ERRORS = [];
    function cfoBootError(context, error) {
      var message = context + ': ' + (error && (error.message || error.reason || error.filename) || String(error || 'Error desconocido'));
      window.CFO_BOOT_ERRORS.push({ at: new Date().toISOString(), message: message });
      console.error('[CFO V7 boot]', message, error);
      var app = document.getElementById('app');
      if (app) {
        app.innerHTML = '<div class="boot-screen"><div class="boot-logo">CFO <span>Personal</span></div><p>No se pudo iniciar la app.</p><pre class="boot-error">' + message.replace(/[&<>"']/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[c]; }) + '</pre></div>';
      }
    }
    window.addEventListener('error', function (event) { cfoBootError('error', event.error || event.message); });
    window.addEventListener('unhandledrejection', function (event) { cfoBootError('promise', event.reason); });
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
